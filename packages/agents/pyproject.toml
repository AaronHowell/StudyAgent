[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "study-agent-agents"
version = "0.1.0"
description = "LangGraph agent runtime for StudyAgent"
requires-python = ">=3.11"
dependencies = [
  "langchain-openai>=0.3.0",
  "langgraph>=0.4.0",
  "study-agent-application",
  "study-agent-documents",
  "study-agent-domain",
  "study-agent-integrations",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
