[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "study-agent-integrations"
version = "0.1.0"
description = "Infrastructure adapters for StudyAgent"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "python-dotenv>=1.0.0",
  "pymysql>=1.1.0",
  "qdrant-client>=1.10.0",
  "study-agent-domain",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
