[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "study-agent-documents"
version = "0.1.0"
description = "Document discovery, PDF parsing, and chunking helpers for StudyAgent"
requires-python = ">=3.11"
dependencies = [
  "pillow>=10.0.0",
  "pymupdf>=1.24.0",
  "pypdf>=5.0.0",
  "study-agent-domain",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
