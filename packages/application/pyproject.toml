[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "study-agent-application"
version = "0.1.0"
description = "Application use cases for StudyAgent"
requires-python = ">=3.11"
dependencies = [
  "study-agent-documents",
  "study-agent-domain",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
